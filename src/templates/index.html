<!DOCTYPE html>
<html>
<head>
    <title>Video OCR</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css?v=mask-layout-4">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="mb-0">Video OCR</h1>
            <a href="/settings" class="btn btn-outline-secondary">환경 설정</a>
        </div>
        
        <!-- 작업 목록(큐) 뷰 -->
        <div id="task-list-view">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="mb-0">작업 큐</h2>
                <button id="stop-all-btn" class="btn btn-outline-warning">모두 중지</button>
            </div>
            <table class="table" id="task-list">
                <thead>
                    <tr>
                        <th>파일명</th>
                        <th>진행 상황</th>
                        <th>상태</th>
                        <th>완료 예상 시간</th>
                        <th>작업 제어</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 작업 row들이 동적으로 추가됩니다. -->
                </tbody>
            </table>
            <button id="new-ocr-btn" class="btn btn-primary float-right">새 OCR 작업 추가</button>
        </div>
        
        <!-- OCR 작업 생성 뷰 (초기엔 숨김) -->
        <div id="ocr-creation-view" style="display:none;">
            <div class="row mt-4">
                <div class="col-md-12">
                    <div id="file-browser" class="mb-3">
                        <div id="current-path" class="font-weight-bold"></div>
                        <ul id="file-list" class="list-group"></ul>
                    </div>
                </div>
                <div class="col-md-12 position-relative">
                    <div id="video-container" class="position-relative">
                        <video id="video" controls class="w-100" disablePictureInPicture controlslist="nofullscreen nodownload noplaybackrate"></video>
                        <div id="bounding-box">
                            <div class="handle top"></div>
                            <div class="handle right"></div>
                            <div class="handle bottom"></div>
                            <div class="handle left"></div>
                        </div>
                        <div id="mask-box"></div>
                    </div>
                </div>
            </div>
            <div class="ocr-control-grid mt-4">
                <div class="time-controls">
                    <div class="time-field">
                        <label for="startTimeInput">OCR 시작 시간 (초):</label>
                        <div class="time-input-shell">
                            <input type="text" id="startTimeInput" placeholder="mm:ss" value="00:00" class="form-control">
                            <span class="time-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" focusable="false">
                                    <circle cx="12" cy="12" r="9"></circle>
                                    <path d="M12 7v5l3 2"></path>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <div class="time-field">
                        <label for="endTimeInput">OCR 종료 시간 (초):</label>
                        <div class="time-input-shell">
                            <input type="text" id="endTimeInput" placeholder="mm:ss" value="00:00" class="form-control">
                            <span class="time-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" focusable="false">
                                    <circle cx="12" cy="12" r="9"></circle>
                                    <path d="M12 7v5l3 2"></path>
                                </svg>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="ocr-mode-control">
                    <div class="ocr-segmented" role="group" aria-label="OCR mode selector">
                        <input type="checkbox" id="fullScreenOcrToggle" class="ocr-mode-input" checked>
                        <button type="button" id="cropOcrModeBtn" class="ocr-segment-button">Crop OCR</button>
                        <button type="button" id="fullScreenOcrModeBtn" class="ocr-segment-button active">Full-screen OCR</button>
                    </div>
                </div>
                <div id="mask-controls" class="mask-panel">
                    <label class="mask-switch-control" for="maskToggle">
                        <input class="form-check-input" type="checkbox" id="maskToggle">
                        <span class="mask-switch-slider" aria-hidden="true"></span>
                        <span class="mask-switch-label">마스킹 사용</span>
                    </label>
                    <span class="mask-divider" aria-hidden="true"></span>
                    <div id="maskHelpText" class="mask-help">
                        <span class="mask-info-icon" aria-hidden="true">i</span>
                        <span>가릴 영역을 마스크로 지정</span>
                    </div>
                    <button type="button" id="clearMaskBtn" class="mask-clear-button" disabled>
                        <span class="mask-clear-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false">
                                <path d="M16 3 3 16l5 5 13-13-5-5Z"></path>
                                <path d="m14 5 5 5"></path>
                                <path d="M4 21h8"></path>
                            </svg>
                        </span>
                        <span>마스크 초기화</span>
                    </button>
                </div>
            </div>
            <div class="row mt-4 mb-4">
                <div class="col-md-12 ocr-action-row">
                    <button id="back-to-list-btn" class="btn btn-secondary">작업 큐로 돌아가기</button>
                    <button id="start-ocr-btn" class="btn btn-success">OCR 시작</button>
                </div>
            </div>
        </div>
        
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
